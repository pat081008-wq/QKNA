<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kriging Neighbourhood Analysis</title>
<script src="credentials.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@300;400;500&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#1a5fa8;--gold-dim:#134c8a;--gold-pale:rgba(26,95,168,0.08);
  --dark:#f0f2f5;--dark2:#ffffff;--dark3:#e8ecf1;--dark4:#dde3ec;--dark5:#d0d9e6;
  --border:rgba(26,95,168,0.2);--border2:rgba(26,95,168,0.09);
  --text:#1c2333;--text-dim:#64748b;
  --red:#c0392b;--blue:#1a5fa8;--green:#1a8c4e;--amber:#b8680a;
  --font-display:'Playfair Display',serif;
  --font-mono:'DM Mono',monospace;
  --font-body:'Crimson Pro',serif
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--text);font-family:var(--font-body);min-height:100vh;font-size:15px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:#e8ecf1}::-webkit-scrollbar-thumb{background:rgba(26,95,168,0.3);border-radius:2px}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-10px)}40%,80%{transform:translateX(10px)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LOGIN SCREEN ── */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;position:relative;overflow:hidden;background:var(--dark)
}
.login-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.login-bg svg{position:absolute;opacity:.035}

.login-card{
  position:relative;z-index:10;
  background:linear-gradient(160deg,var(--dark2),var(--dark3));
  border:1px solid var(--border);
  padding:52px 44px;width:100%;max-width:440px;
  box-shadow:0 48px 96px rgba(0,0,0,.12),inset 0 1px 0 rgba(26,95,168,.08);
  animation:fadeUp .6s ease
}
.login-card.shake{animation:shake .45s ease}

.login-gem{
  width:56px;height:56px;margin:0 auto 20px;
  border:1.5px solid var(--gold);transform:rotate(45deg);
  display:flex;align-items:center;justify-content:center;background:var(--gold-pale)
}
.login-gem span{transform:rotate(-45deg);font-size:20px;color:var(--gold)}

.login-mrec{display:flex;justify-content:center;margin-bottom:20px}
.login-mrec img{height:60px;width:auto;object-fit:contain}

.login-title{font-family:var(--font-display);font-size:24px;font-weight:600;text-align:center;color:var(--text);letter-spacing:.03em}
.login-subtitle{font-size:10px;letter-spacing:.18em;color:var(--text-dim);text-align:center;margin-top:5px;font-family:var(--font-mono);text-transform:uppercase}
.login-divider{height:1px;background:var(--border);margin:28px 0}

.fl{margin-bottom:18px}
.fl label{display:block;font-size:10px;letter-spacing:.14em;color:var(--gold-dim);margin-bottom:7px;font-family:var(--font-mono);text-transform:uppercase}
.fi{
  width:100%;background:rgba(255,255,255,0.7);border:1px solid var(--border2);
  color:var(--text);padding:11px 14px;font-family:var(--font-mono);font-size:13px;
  outline:none;transition:border-color .2s,box-shadow .2s
}
.fi:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-pale)}

.login-err{
  color:var(--red);font-size:11px;text-align:center;
  min-height:16px;margin-bottom:14px;font-family:var(--font-mono)
}
.btn-gold{
  width:100%;padding:13px;background:transparent;
  border:1px solid var(--gold);color:var(--gold);
  font-family:var(--font-mono);font-size:11px;letter-spacing:.18em;
  cursor:pointer;transition:background .2s,box-shadow .2s,color .2s;
  position:relative;overflow:hidden;text-transform:uppercase
}
.btn-gold::before{
  content:'';position:absolute;inset:0;background:var(--gold);
  transform:scaleX(0);transform-origin:left;transition:transform .25s;z-index:0
}
.btn-gold:hover::before{transform:scaleX(1)}
.btn-gold:hover{color:var(--dark2)}
.btn-gold span{position:relative;z-index:1}

.login-footer{
  margin-top:22px;text-align:center;
  font-size:10px;color:var(--text-dim);font-family:var(--font-mono);
  letter-spacing:.06em
}
.login-footer a{color:var(--text-dim);text-decoration:none}
.login-footer a:hover{color:var(--gold)}

/* ── DASHBOARD WRAPPER ── */
#app-wrapper{display:none;flex-direction:column;height:100vh}
#app-wrapper.active{display:flex}

/* Session bar above the iframe */
#session-bar{
  display:flex;align-items:center;gap:12px;
  padding:0 20px;height:32px;
  background:var(--dark2);border-bottom:1px solid var(--border2);
  font-family:var(--font-mono);font-size:9px;color:var(--text-dim);
  flex-shrink:0
}
#session-bar .dot{
  width:7px;height:7px;background:var(--green);border-radius:50%;flex-shrink:0;
  box-shadow:0 0 5px rgba(26,140,78,0.4)
}
#session-bar .sep{flex:1}
.btn-out{
  background:none;border:1px solid var(--border2);color:var(--text-dim);
  padding:3px 10px;cursor:pointer;font-family:var(--font-mono);font-size:9px;
  letter-spacing:.12em;transition:all .2s;text-transform:uppercase
}
.btn-out:hover{border-color:var(--red);color:var(--red)}

#app-frame{flex:1;border:none;width:100%;display:block}
</style>
</head>

    <div class="login-title">Kriging Neighbourhood Analysis</div>
    <div class="login-divider"></div>

    <div class="fl"><label>Username</label><input class="fi" id="inp-user" type="text" placeholder="Enter username" autocomplete="username" spellcheck="false" autocorrect="off" autocapitalize="off"></div>
    <div class="fl"><label>Password</label><input class="fi" id="inp-pass" type="password" placeholder="Enter password" autocomplete="current-password"></div>

    <div class="login-err" id="login-err"></div>
    <button class="btn-gold" id="login-btn" onclick="doLogin()"><span id="btn-text">Access Platform →</span></button>


  </div>
</div>

<!-- ══ DASHBOARD WRAPPER ══ -->
<div id="app-wrapper">
  <div id="session-bar">
    <div class="dot"></div>
    <span>Signed in as <strong id="logged-user" style="color:var(--gold);letter-spacing:.08em;"></strong></span>
    <span class="sep"></span>
    <button class="btn-out" onclick="doLogout()">Logout</button>
  </div>
  <iframe id="app-frame" src="dashboard.html" allowfullscreen></iframe>
</div>

<script>
// ── SESSION ──────────────────────────────────────────────────────────────────
const SESSION_KEY = 'kna_session';

(function boot() {
  const saved = sessionStorage.getItem(SESSION_KEY);
  if (saved) {
    try {
      const { display } = JSON.parse(saved);
      revealDashboard(display, false);
    } catch (_) { sessionStorage.removeItem(SESSION_KEY); }
  }
})();

// ── ENTER KEY ─────────────────────────────────────────────────────────────────
document.getElementById('inp-user').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inp-pass').focus();
});
document.getElementById('inp-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function doLogin() {
  const u = document.getElementById('inp-user').value;   // preserve spaces & all chars
  const p = document.getElementById('inp-pass').value;
  const errEl = document.getElementById('login-err');
  errEl.textContent = '';

  if (!u.length || !p.length) {
    errEl.textContent = 'Please enter both username and password.';
    shake();
    return;
  }

  // credentials.js defines CREDENTIALS.users
  const match = CREDENTIALS.users.find(user => user.username === u && user.password === p);

  if (match) {
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({ display: match.display }));
    revealDashboard(match.display, true);
  } else {
    errEl.textContent = 'Invalid credentials. Please try again.';
    document.getElementById('inp-pass').value = '';
    shake();
  }
}

function shake() {
  const c = document.getElementById('login-card');
  c.classList.remove('shake');
  void c.offsetWidth;
  c.classList.add('shake');
  setTimeout(() => c.classList.remove('shake'), 500);
}

// ── REVEAL DASHBOARD ──────────────────────────────────────────────────────────
function revealDashboard(displayName, animate) {
  document.getElementById('logged-user').textContent = displayName;

  const loginEl = document.getElementById('login-screen');
  const appEl   = document.getElementById('app-wrapper');
  const frame   = document.getElementById('app-frame');

  // Size the iframe to fill remaining height
  function sizeFrame() {
    const barH = document.getElementById('session-bar').offsetHeight;
    frame.style.height = (window.innerHeight - barH) + 'px';
  }
  window.addEventListener('resize', sizeFrame);
  requestAnimationFrame(sizeFrame);

  if (animate) {
    loginEl.style.transition = 'opacity .25s';
    loginEl.style.opacity = '0';
    setTimeout(() => {
      loginEl.style.display = 'none';
      appEl.classList.add('active');
    }, 250);
  } else {
    loginEl.style.display = 'none';
    appEl.classList.add('active');
  }
}

// ── LOGOUT ────────────────────────────────────────────────────────────────────
function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  const loginEl = document.getElementById('login-screen');
  const appEl   = document.getElementById('app-wrapper');

  appEl.classList.remove('active');
  loginEl.style.display = '';
  loginEl.style.opacity = '0';
  loginEl.style.transition = 'opacity .3s';

  document.getElementById('inp-user').value = '';
  document.getElementById('inp-pass').value = '';
  document.getElementById('login-err').textContent = '';

  requestAnimationFrame(() => {
    loginEl.style.opacity = '1';
  });
}
</script>
</body>
